[build]
  publish = "."
  edge_functions = "netlify/edge-functions"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions."sync-truckpaper-background"]
  timeout = 300

[[edge_functions]]
  path = "/vehicle.html"
  function = "vehicle"

[[redirects]]
  from = "/sitemap.xml"
  to = "/.netlify/functions/sitemap"
  status = 200
