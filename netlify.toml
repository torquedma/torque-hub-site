[build]
  publish = "."
  edge_functions = "netlify/edge-functions"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions."sync-truckpaper-background"]
  timeout = 300

[functions."generate-dx-background"]
  timeout = 900

[[edge_functions]]
  path = "/inventory.html"
  function = "inventory"

[[edge_functions]]
  path = "/vehicle.html"
  function = "vehicle"

