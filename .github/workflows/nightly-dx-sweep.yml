name: Nightly DX Sweep
on:
  schedule:
    - cron: '30 7 * * *'   # 7:30 AM UTC daily, after HGR/feed syncs settle
  workflow_dispatch:        # allow manual trigger from GitHub Actions UI too

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger DX sweep (process all units needing DX)
        run: |
          curl -sS -m 870 "https://hub.torquedma.com/.netlify/functions/generate-dx-background?limit=all" || true
          echo "DX sweep triggered."
