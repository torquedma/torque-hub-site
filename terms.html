<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terms of Service | Torque Hub</title>
<meta name="description" content="Torque Hub terms of service.">
<meta name="robots" content="index, follow">
<link rel="icon" href="/favicon.ico">
<style>
  :root { --bg:#0b1220; --panel:#0f172a; --panel-2:#1e293b; --line:rgba(255,255,255,0.08); --text:#f8fafc; --muted:#94a3b8; --soft:#cbd5e1; --accent:#2563eb; }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; line-height: 1.6; }
  a { color: var(--soft); }
  a:hover { color: var(--text); }
  .container { max-width: 880px; margin: 0 auto; padding: 0 24px; }
  header.site { padding: 24px 0; border-bottom: 1px solid var(--line); }
  header.site .container { display: flex; align-items: center; gap: 16px; }
  .brand { display: flex; align-items: center; gap: 14px; text-decoration: none; color: var(--text); }
  .brand img { width: 40px; height: 40px; }
  .brand h1 { margin: 0; font-family: "Barlow Condensed", sans-serif; font-size: 22px; font-weight: 900; letter-spacing: 0.02em; text-transform: uppercase; }
  .brand .sub { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; }
  main { padding: 56px 0 80px; }
  main h1 { font-family: "Barlow Condensed", sans-serif; font-size: clamp(40px, 6vw, 64px); font-weight: 900; line-height: 1; text-transform: uppercase; letter-spacing: -0.01em; margin: 0 0 8px; }
  main .meta { color: var(--muted); font-size: 14px; margin: 0 0 40px; }
  main p { color: var(--soft); font-size: 15px; }
  footer.site { border-top: 1px solid var(--line); padding: 32px 0; color: var(--muted); font-size: 13px; }
  footer.site .container { display: flex; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  footer.site a { color: var(--soft); text-decoration: none; }
  footer.site a:hover { color: var(--text); }
</style>
</head>
<body>
<header class="site">
  <div class="container">
    <a class="brand" href="/">
      <img src="/torque-logo.png" alt="Torque Hub" onerror="this.style.display='none'">
      <div>
        <h1>Torque Hub</h1>
        <div class="sub">Powered by Torque DMA</div>
      </div>
    </a>
  </div>
</header>

<main>
  <div class="container">
    <h1>Terms of Service</h1>
    <p class="meta">Coming soon</p>
    <p>Our full Terms of Service are being finalized. In the meantime, please review our <a href="/privacy">Privacy Policy</a> or contact us at <a href="mailto:privacy@torquedma.com">privacy@torquedma.com</a> with any questions.</p>
  </div>
</main>

<footer class="site">
  <div class="container">
    <span>© 2026 Torque Hub. All rights reserved.</span>
    <span><a href="/">Home</a> · <a href="/privacy">Privacy Policy</a></span>
  </div>
</footer>
</body>
</html>
